name: Vinyl Discovery

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC (09:00 BRT) — once per day
  workflow_dispatch:        # manual trigger from the GitHub Actions UI

concurrency:
  group: discovery
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run discovery
        run: python crawler/lastfm_discovery.py
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          LASTFM_API_KEY:  ${{ secrets.LASTFM_API_KEY }}
          ASSOCIATE_TAG:   ${{ secrets.ASSOCIATE_TAG }}

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Discovery failed — ${new Date().toISOString().slice(0, 16)} UTC`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The daily vinyl discovery workflow failed.\n\n[View run](${runUrl})`,
              labels: ['crawler-failure'],
            });

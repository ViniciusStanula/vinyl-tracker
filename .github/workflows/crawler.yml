name: Vinyl Crawler

on:
  schedule:
    - cron: '0 * * * *'   # every hour — adjust to '0 */2 * * *' for every-2h
  workflow_dispatch:       # manual trigger from the GitHub Actions UI

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60    # hard kill if something stalls
    permissions:
      issues: write        # needed for the "open issue on failure" step

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        run: python crawler/main.py --max-pages 300 --stale-max 150 --stale-workers 4
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ASSOCIATE_TAG: ${{ secrets.ASSOCIATE_TAG }}

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Crawler failed — ${new Date().toISOString().slice(0, 16)} UTC`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The hourly crawler workflow failed.\n\n[View run](${runUrl})`,
              labels: ['crawler-failure'],
            });

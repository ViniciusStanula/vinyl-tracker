name: Crawler de Preços

on:
  schedule:
    - cron: '0 9,21 * * *'    # roda às 9h e 21h UTC (6h e 18h BRT)
  workflow_dispatch:            # permite rodar manualmente pelo painel do GitHub

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r crawler/requirements.txt

      - name: Executar crawler
        run: python crawler/main.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
